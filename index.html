<style>
  :root{
    --bg:#191A1E;
    --bg-2:#141518;
    --panel:#222329;
    --panel-2:#2A2C34;
    --line:#383A44;
    --text:#EDEEF2;
    --muted:#9199A6;
    --muted-2:#6C7280;
    --yellow:#F5B400;
    --yellow-dim:#8A6300;
    --blue:#4C8FD1;
    --green:#45B56E;
    --amber:#F2A33C;
    --red:#E5543D;
    --gray-status:#7C818C;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100%;}
  body{-webkit-font-smoothing:antialiased;}
  ::selection{background:var(--yellow);color:#1a1a1a;}
  .mono{font-family:'JetBrains Mono',monospace;}
  h1,h2,h3,h4,.display{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.03em;font-weight:600;margin:0;}
  a{color:inherit;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}

  .shell{display:flex;min-height:100vh;}

  /* SIDEBAR */
  .sidebar{
    width:220px;flex-shrink:0;background:var(--bg-2);border-right:1px solid var(--line);
    display:flex;flex-direction:column;padding:22px 14px;position:sticky;top:0;height:100vh;
  }
  .brand{display:flex;align-items:center;gap:10px;padding:0 8px 22px 8px;border-bottom:1px solid var(--line);margin-bottom:18px;}
  .brand-mark{width:34px;height:34px;border-radius:6px;background:var(--yellow);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .brand-mark svg{width:20px;height:20px;}
  .brand-name{font-family:'Oswald',sans-serif;font-size:17px;font-weight:700;letter-spacing:0.04em;}
  .brand-sub{font-size:10px;color:var(--muted-2);letter-spacing:0.08em;margin-top:-2px;}
  .nav{display:flex;flex-direction:column;gap:3px;}
  .nav-item{
    display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:8px;color:var(--muted);
    font-size:13.5px;font-weight:500;background:none;border:none;text-align:left;width:100%;transition:background .12s, color .12s;
  }
  .nav-item svg{width:17px;height:17px;flex-shrink:0;opacity:.85;}
  .nav-item:hover{background:var(--panel);color:var(--text);}
  .nav-item.active{background:var(--panel-2);color:var(--yellow);}
  .nav-item.active svg{opacity:1;}
  .nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;}
  .sidebar-foot{margin-top:auto;padding-top:14px;border-top:1px solid var(--line);font-size:10.5px;color:var(--muted-2);line-height:1.5;}

  /* MAIN */
  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .topbar{
    display:flex;align-items:center;gap:12px;padding:16px 28px;border-bottom:1px solid var(--line);
    background:var(--bg);position:sticky;top:0;z-index:5;
  }
  .search-wrap{position:relative;flex:1;max-width:380px;}
  .search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--muted-2);}
  .search-input{
    width:100%;background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--text);
    padding:9px 12px 9px 34px;font-size:13px;
  }
  .search-input:focus{outline:none;border-color:var(--yellow-dim);}
  .top-spacer{flex:1;}
  .btn{
    display:inline-flex;align-items:center;gap:7px;border-radius:8px;border:1px solid var(--line);
    background:var(--panel);color:var(--text);padding:9px 16px;font-size:13px;font-weight:600;white-space:nowrap;
    transition:filter .12s, background .12s;
  }
  .btn svg{width:15px;height:15px;}
  .btn:hover{filter:brightness(1.15);}
  .btn-primary{background:var(--yellow);color:#221900;border-color:var(--yellow);}
  .btn-primary:hover{filter:brightness(1.08);}
  .btn-ghost{background:transparent;}
  .btn-danger{background:var(--red);border-color:var(--red);color:#fff;}
  .btn-sm{padding:6px 12px;font-size:12px;border-radius:6px;}
  .btn:disabled{opacity:.45;cursor:not-allowed;}

  .view-root{padding:26px 28px 60px 28px;flex:1;}
  .view-header{margin-bottom:20px;}
  .view-header .eyebrow{color:var(--yellow);font-size:11px;letter-spacing:.14em;font-weight:700;text-transform:uppercase;margin-bottom:4px;}
  .view-header h1{font-size:26px;}
  .view-header p{color:var(--muted);font-size:13.5px;margin-top:6px;max-width:640px;}

  /* DASHBOARD */
  .stat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:22px;}
  .stat-card{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 16px 14px 16px;
    border-top:3px solid var(--gray-status);
  }
  .stat-card.st-available{border-top-color:var(--green);}
  .stat-card.st-inuse{border-top-color:var(--blue);}
  .stat-card.st-overdue{border-top-color:var(--red);}
  .stat-card.st-repair{border-top-color:var(--amber);}
  .stat-card.st-missing{border-top-color:var(--gray-status);}
  .stat-num{font-family:'Oswald',sans-serif;font-size:30px;font-weight:700;}
  .stat-label{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}

  .dash-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px;}
  .panel-title{display:flex;align-items:center;justify-content:between;margin-bottom:14px;}
  .panel-title h3{font-size:14px;letter-spacing:.05em;}
  .panel-title .count{margin-left:auto;font-size:11px;color:var(--muted-2);}

  .row-list{display:flex;flex-direction:column;gap:0;}
  .asset-row{
    display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer;
  }
  .asset-row:last-child{border-bottom:none;}
  .asset-row:hover .asset-name{color:var(--yellow);}
  .status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .dot-available{background:var(--green);}
  .dot-inuse{background:var(--blue);}
  .dot-overdue{background:var(--red);}
  .dot-repair{background:var(--amber);}
  .dot-missing{background:var(--gray-status);}
  .asset-name{font-size:13.5px;font-weight:600;transition:color .12s;}
  .asset-meta{font-size:11.5px;color:var(--muted-2);}
  .asset-row .right{margin-left:auto;text-align:right;}

  .alert-item{display:flex;gap:10px;padding:11px 0;border-bottom:1px solid var(--line);}
  .alert-item:last-child{border-bottom:none;}
  .alert-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .alert-icon svg{width:16px;height:16px;}
  .alert-icon.danger{background:rgba(229,84,61,.15);color:var(--red);}
  .alert-icon.warn{background:rgba(242,163,60,.15);color:var(--amber);}
  .alert-icon.info{background:rgba(76,143,209,.15);color:var(--blue);}
  .alert-title{font-size:12.5px;font-weight:700;}
  .alert-detail{font-size:11.5px;color:var(--muted);margin-top:1px;}
  .alert-time{font-size:10px;color:var(--muted-2);margin-top:3px;}
  .empty-note{color:var(--muted-2);font-size:12.5px;padding:8px 0;}

  /* BADGES */
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px 3px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em;}
  .badge .dot{width:6px;height:6px;border-radius:50%;}
  .badge-available{background:rgba(69,181,110,.15);color:var(--green);}
  .badge-available .dot{background:var(--green);}
  .badge-inuse{background:rgba(76,143,209,.15);color:var(--blue);}
  .badge-inuse .dot{background:var(--blue);}
  .badge-overdue{background:rgba(229,84,61,.15);color:var(--red);}
  .badge-overdue .dot{background:var(--red);}
  .badge-repair{background:rgba(242,163,60,.15);color:var(--amber);}
  .badge-repair .dot{background:var(--amber);}
  .badge-missing{background:rgba(124,129,140,.18);color:#c3c7ce;}
  .badge-missing .dot{background:var(--gray-status);}

  /* ASSET GRID / LIST VIEW */
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
  .chip{
    padding:6px 13px;border-radius:20px;border:1px solid var(--line);background:var(--panel);color:var(--muted);
    font-size:12px;font-weight:600;
  }
  .chip.active{background:var(--yellow);color:#221900;border-color:var(--yellow);}
  .asset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;}
  .asset-card{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:15px;cursor:pointer;
    transition:border-color .12s, transform .12s;
  }
  .asset-card:hover{border-color:var(--yellow-dim);transform:translateY(-2px);}
  .asset-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
  .asset-card .aid{font-size:10.5px;color:var(--muted-2);letter-spacing:.05em;}
  .asset-card .aname{font-size:14.5px;font-weight:700;margin-top:2px;}
  .asset-card .adetail{font-size:11.5px;color:var(--muted);margin-top:8px;line-height:1.6;}
  .asset-card .adetail b{color:var(--text);font-weight:600;}

  /* TAG / SIGNATURE ELEMENT */
  .tag-card{
    position:relative;background:#F4EFE2;color:#1c1c1c;border-radius:8px;padding:20px 18px 16px 18px;width:260px;
    box-shadow:0 10px 24px rgba(0,0,0,.35);
    background-image:
      repeating-linear-gradient(0deg, rgba(0,0,0,.035) 0px, rgba(0,0,0,.035) 1px, transparent 1px, transparent 3px);
  }
  .tag-hole{
    position:absolute;top:10px;left:50%;transform:translateX(-50%);width:16px;height:16px;border-radius:50%;
    background:var(--bg-2);box-shadow:inset 0 2px 3px rgba(0,0,0,.6);
  }
  .tag-card::before{
    content:"";position:absolute;inset:6px;border:1.5px dashed rgba(0,0,0,.28);border-radius:6px;pointer-events:none;
  }
  .tag-top{text-align:center;margin-top:10px;margin-bottom:8px;}
  .tag-top .tag-eyebrow{font-size:9px;letter-spacing:.2em;color:#6b5b34;font-weight:700;}
  .tag-top .tag-id{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;letter-spacing:.03em;color:#1c1c1c;}
  .tag-qr{display:flex;justify-content:center;margin:8px 0 10px 0;}
  .tag-qr img, .tag-qr canvas, .tag-qr table{border-radius:4px;}
  .tag-name{text-align:center;font-family:'Oswald',sans-serif;font-size:12.5px;text-transform:uppercase;letter-spacing:.03em;}
  .tag-sub{text-align:center;font-size:10px;color:#5b5b5b;margin-top:3px;font-family:'JetBrains Mono',monospace;}

  /* FORMS */
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .field.full{grid-column:1/-1;}
  .field label{font-size:11.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
  .field input, .field select, .field textarea{
    background:var(--panel-2);border:1px solid var(--line);border-radius:7px;color:var(--text);padding:10px 12px;font-size:13.5px;
  }
  .field input:focus, .field select:focus, .field textarea:focus{outline:none;border-color:var(--yellow-dim);}
  .form-actions{display:flex;gap:10px;margin-top:20px;}

  /* MODAL */
  .overlay{
    position:fixed;inset:0;background:rgba(10,10,12,.68);display:flex;align-items:center;justify-content:center;
    z-index:50;padding:20px;
  }
  .modal{
    background:var(--bg-2);border:1px solid var(--line);border-radius:14px;max-width:760px;width:100%;
    max-height:88vh;overflow-y:auto;padding:0;
  }
  .modal-head{display:flex;align-items:center;gap:14px;padding:20px 24px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg-2);}
  .modal-head .htitle{font-size:19px;}
  .modal-head .close-btn{margin-left:auto;background:var(--panel);border:1px solid var(--line);border-radius:7px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;color:var(--muted);}
  .modal-body{padding:22px 24px 26px 24px;}
  .modal-cols{display:grid;grid-template-columns:260px 1fr;gap:24px;}
  .detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px;}
  .detail-row:last-child{border-bottom:none;}
  .detail-row .k{color:var(--muted);}
  .detail-row .v{font-weight:600;text-align:right;}
  .action-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px;}
  .history-list{margin-top:18px;}
  .hist-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:12.5px;}
  .hist-item:last-child{border-bottom:none;}
  .hist-item .htime{color:var(--muted-2);width:130px;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:11px;}
  .hist-item .haction{font-weight:700;}
  .hist-item .hdetail{color:var(--muted);}

  .inline-form{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:14px;margin-top:14px;}
  .inline-form .field{margin-bottom:10px;}
  .inline-form input[type="file"]{font-size:11.5px;color:var(--muted);}
  .scan-result{border-radius:8px;padding:10px 12px;margin-top:8px;font-size:13px;border:1px solid var(--line);}
  .scan-result.scan-ok{background:rgba(69,181,110,.12);border-color:rgba(69,181,110,.4);color:var(--green);}
  .scan-result.scan-warn{background:rgba(242,163,60,.12);border-color:rgba(242,163,60,.4);color:var(--amber);}
  .scan-result.scan-damage{background:rgba(229,84,61,.12);border-color:rgba(229,84,61,.4);color:var(--red);}

  /* SCAN VIEW */
  .scan-wrap{display:flex;gap:22px;flex-wrap:wrap;}
  .scan-cam{
    width:340px;height:340px;border-radius:12px;background:#000;border:1px solid var(--line);position:relative;overflow:hidden;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .scan-cam video{width:100%;height:100%;object-fit:cover;}
  .scan-frame{position:absolute;inset:36px;border:2px solid var(--yellow);border-radius:10px;pointer-events:none;box-shadow:0 0 0 2000px rgba(0,0,0,.28);}
  .scan-msg{color:var(--muted);font-size:12.5px;text-align:center;padding:20px;}
  .scan-side{flex:1;min-width:280px;}
  .quick-pick{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .quick-pick button{
    background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--text);font-family:'JetBrains Mono',monospace;
  }
  .quick-pick button:hover{border-color:var(--yellow-dim);color:var(--yellow);}

  .toast{
    position:fixed;bottom:22px;right:22px;background:var(--panel-2);border:1px solid var(--line);border-left:4px solid var(--green);
    border-radius:8px;padding:12px 18px;font-size:13px;font-weight:600;z-index:100;box-shadow:0 10px 24px rgba(0,0,0,.4);
    animation:toastIn .18s ease-out;
  }
  @keyframes toastIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

  @media (max-width:900px){
    .sidebar{display:none;}
    .stat-grid{grid-template-columns:repeat(2,1fr);}
    .dash-grid{grid-template-columns:1fr;}
    .modal-cols{grid-template-columns:1fr;}
    .form-grid{grid-template-columns:1fr;}
  }

  :focus-visible{outline:2px solid var(--yellow);outline-offset:2px;}

  /* HIDDEN UTILITY */
  .hidden{display:none!important;}
  .live-pill{
    display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;
    padding:5px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.06em;
  }
  .live-pill.live-ok{color:var(--green);background:rgba(69,181,110,.12);border:1px solid rgba(69,181,110,.35);}
  .live-pill.live-warn{color:var(--amber);background:rgba(242,163,60,.12);border:1px solid rgba(242,163,60,.35);}
  .live-dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:livePulse 1.8s ease-in-out infinite;}
  @keyframes livePulse{0%,100%{opacity:1;} 50%{opacity:.35;}}

  /* GATE SCREEN */
  .gate-wrap{
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:40px 20px;background:radial-gradient(circle at 30% 20%, #202228 0%, var(--bg) 55%);
  }
  .gate-brand{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
  .gate-title{font-size:20px;color:var(--muted);margin-bottom:26px;font-weight:400;text-transform:none;letter-spacing:0;font-family:'Inter',sans-serif;}
  .gate-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;width:100%;max-width:660px;}
  .gate-card{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:26px 22px;text-align:left;
    display:flex;flex-direction:column;gap:10px;transition:border-color .15s, transform .15s;color:var(--text);
  }
  .gate-card:hover{border-color:var(--yellow-dim);transform:translateY(-3px);}
  .gate-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;}
  .gate-icon svg{width:22px;height:22px;}
  .gate-icon.staff{background:rgba(245,180,0,.15);color:var(--yellow);}
  .gate-icon.admin{background:rgba(76,143,209,.15);color:var(--blue);}
  .gate-card-title{font-family:'Oswald',sans-serif;font-size:16px;text-transform:uppercase;letter-spacing:.03em;}
  .gate-card-sub{font-size:12.5px;color:var(--muted);line-height:1.5;}
  @media (max-width:640px){ .gate-grid{grid-template-columns:1fr;} }

  /* STAFF KIOSK SHELL */
  .kiosk-wrap{min-height:100vh;display:flex;flex-direction:column;}
  .kiosk-topbar{display:flex;align-items:center;gap:12px;padding:16px 24px;border-bottom:1px solid var(--line);background:var(--bg-2);}
  .kiosk-wrap .view-root{max-width:520px;margin:0 auto;width:100%;padding:32px 20px 60px 20px;}
  .kiosk-hero{text-align:center;margin-bottom:22px;}
  .kiosk-hero h1{font-size:22px;}
  .kiosk-hero p{color:var(--muted);font-size:13px;margin-top:6px;}
  .kiosk-result-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;margin-top:18px;}
  .kiosk-result-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px;}
  .kiosk-result-top .aid{font-size:11px;color:var(--muted-2);letter-spacing:.05em;}
  .kiosk-result-top .aname{font-size:17px;font-weight:700;margin-top:2px;}
  .kiosk-note{font-size:12.5px;color:var(--muted);margin-top:10px;}
  .kiosk-success{
    text-align:center;padding:26px 10px;
  }
  .kiosk-success .check{
    width:56px;height:56px;border-radius:50%;background:rgba(69,181,110,.15);color:var(--green);
    display:flex;align-items:center;justify-content:center;margin:0 auto 14px auto;
  }
  .kiosk-success .check svg{width:28px;height:28px;}
  .kiosk-success h3{font-size:17px;margin-bottom:6px;}
  .kiosk-success p{font-size:13px;color:var(--muted);margin-bottom:18px;}
</style>
</head>

function mkAsset(id,name,category,serial,value,status,zone,liveStatus,assignedTo,project,dueDate,history,approvedBy){
  return {id,name,category,serial,value,status,zone,assignedTo,project,dueDate,approvedBy:approvedBy||null,checkOutTime:dueDate?history[history.length-1].time:null,history};

function fmtDate(ts){
  if(!ts) return "—";
  const d = new Date(ts);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) + " " + d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}
function fmtShort(ts){
  const d = new Date(ts);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + " " + d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}
function timeAgo(ts){
  const diff = Date.now()-ts;
  const day = Math.floor(diff/86400000);
  if(day>0) return day+"d ago";
  const hr = Math.floor(diff/3600000);
  if(hr>0) return hr+"h ago";
  const min = Math.floor(diff/60000);
  return Math.max(min,0)+"m ago";
}

async function initStorage(){
  if(window.storage){
    dbMode = "claude";
    return;
  }
  if(FIREBASE_CONFIG && window.firebase){
    try{
      firebase.initializeApp(FIREBASE_CONFIG);
      fbRef = firebase.database().ref(STORAGE_KEY);
      dbMode = "firebase";
      return;
    }catch(e){ console.error("Firebase init failed, falling back to local-only mode", e); }
  }
  dbMode = "local";
}

async function loadData(){
  await initStorage();

  if(dbMode==="claude"){
    try{
      const res = await window.storage.get(STORAGE_KEY, true);
      if(res && res.value){ DATA = JSON.parse(res.value); lastSyncedRaw = res.value; }
      else { DATA = seedData(); await saveData(); }
    }catch(e){
      DATA = seedData();
      try{ await saveData(); }catch(e2){ console.error("save failed", e2); }
    }
    return;
  }

  if(dbMode==="firebase"){
    await new Promise(resolve=>{
      fbRef.once("value", snap=>{
        const val = snap.val();
        if(val){ DATA = val; } else { DATA = seedData(); saveData(); }
        // true real-time push — fires the instant any device writes
        fbRef.on("value", snap2=>{
          const v2 = snap2.val();
          if(v2){ DATA = v2; softRefresh(); }
        });
        resolve();
      }, err=>{ console.error("Firebase read failed", err); DATA = seedData(); resolve(); });
    });
    return;
  }

  // local-only fallback (single device / single browser)
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){ DATA = JSON.parse(raw); } else { DATA = seedData(); saveData(); }
  }catch(e){ DATA = seedData(); }
}

async function saveData(){
  if(dbMode==="claude"){
    try{
      const raw = JSON.stringify(DATA);
      await window.storage.set(STORAGE_KEY, raw, true);
      lastSyncedRaw = raw;
    }catch(e){ console.error("Storage error", e); }
    return;
  }
  if(dbMode==="firebase"){
    try{ await fbRef.set(DATA); }catch(e){ console.error("Firebase write failed", e); }
    return;
  }
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA)); }catch(e){ console.error("localStorage error", e); }
}

/* ---------------------------------------------------------------
   LIVE SYNC
   - "claude" mode: short polling (every 4s), since window.storage
     has no push mechanism.
   - "firebase" mode: true real-time push via fbRef.on('value', …)
     set up in loadData() — no polling needed.
   - "local" mode: nothing to sync, single device only.
--------------------------------------------------------------- */
let lastSyncedRaw = null;
let syncInFlight = false;
async function pollForUpdates(){
  if(dbMode!=="claude" || syncInFlight) return;
  syncInFlight = true;
  try{
    const res = await window.storage.get(STORAGE_KEY, true);
    if(res && res.value && res.value !== lastSyncedRaw){
      DATA = JSON.parse(res.value);
      lastSyncedRaw = res.value;
      softRefresh();
    }
  }catch(e){ /* transient — try again next tick */ }
  syncInFlight = false;
}
function softRefresh(){
  renderNav();
  if(appMode==="admin"){
    const modalRoot = document.getElementById("modalRoot");
    const modalOpen = modalRoot && modalRoot.innerHTML.trim() !== "";
    if(!modalOpen && (currentView==="dashboard"||currentView==="assets"||currentView==="alerts")){
      renderView();
    }
  } else if(appMode==="staff"){
    const resultZone = document.getElementById("kioskResultZone");
    const idle = resultZone && resultZone.innerHTML.trim()==="";
    if(idle){
      const panel = document.getElementById("kioskQuickPick");
      if(panel) panel.innerHTML = DATA.assets.slice(0,10).map(a=>`<button onclick="staffScanResult('${a.id}')">${a.id}</button>`).join("");
    }
  }
}
setInterval(pollForUpdates, 4000);
function updateLivePill(){
  let label, cls;
  if(dbMode==="firebase"){ label="Live · Synced"; cls="live-ok"; }
  else if(dbMode==="claude"){ label="Live · Synced"; cls="live-ok"; }
  else { label="This Device Only"; cls="live-warn"; }
  document.querySelectorAll(".live-pill").forEach(el=>{
    el.classList.remove("live-ok","live-warn");
    el.classList.add(cls);
    el.innerHTML = `<span class="live-dot"></span>${label}`;
  });
}

/* effective status computes overdue on the fly */
function effectiveStatus(a){
  if(a.status==="In Use" && a.dueDate && Date.now() > a.dueDate) return "Overdue";
  return a.status;
}
function statusKey(s){
  return {"Available":"available","In Use":"inuse","Overdue":"overdue","Under Repair":"repair","Missing":"missing"}[s] || "available";
}
function badge(status){
  const k = statusKey(status);
  return `<span class="badge badge-${k}"><span class="dot"></span>${status}</span>`;
}
function dot(status){
  const k = statusKey(status);
  return `<span class="status-dot dot-${k}"></span>`;
}
function findAsset(id){ return DATA.assets.find(a=>a.id===id); }

function addLog(type,title,detail){
  DATA.log.unshift({time:Date.now(),type,title,detail});
  DATA.log = DATA.log.slice(0,40);
}

function nextAssetId(category){
  const prefix = CATEGORY_PREFIX[category] || "TOOL";
  const nums = DATA.assets.filter(a=>a.id.startsWith(prefix+"-")).map(a=>parseInt(a.id.split("-")[1])||0);
  const next = (nums.length? Math.max(...nums):0)+1;
  return prefix+"-"+String(next).padStart(3,"0");
}

    new QRCode(qrEl, {text:a.id, width:120, height:120, colorDark:"#1c1c1c", colorLight:"#F4EFE2", correctLevel: QRCode.CorrectLevel.M});
  }catch(e){ qrEl.innerHTML = `<div class="mono" style="font-size:11px;">${a.id}</div>`; }
}
function closeModal(){ document.getElementById("modalRoot").innerHTML = ""; }

function renderActions(a, st){
  if(st==="Available"){
    return `<div class="action-grid">
      <button class="btn btn-primary btn-sm" onclick="openInline('${a.id}','checkout')">Check Out</button>
      <button class="btn btn-sm" onclick="openInline('${a.id}','move')">Move</button>
      <button class="btn btn-sm" onclick="openInline('${a.id}','repair')">Report Damage</button>
      <button class="btn btn-sm" onclick="openInline('${a.id}','missing')">Mark Missing</button>
    </div><div id="inlineZone"></div>`;
  }
  if(st==="In Use" || st==="Overdue"){
    return `<div class="action-grid">
      <button class="btn btn-primary btn-sm" onclick="openInline('${a.id}','return')">Return Asset</button>
      <button class="btn btn-sm" onclick="openInline('${a.id}','move')">Move</button>
      <button class="btn btn-sm" onclick="openInline('${a.id}','missing')">Mark Missing</button>
    </div><div id="inlineZone"></div>`;
  }
  if(st==="Under Repair"){
    return `<div class="action-grid">
      <button class="btn btn-primary btn-sm" onclick="doAction('${a.id}','restore')">Mark Repaired / Available</button>
    </div><div id="inlineZone"></div>`;

      <button class="btn btn-primary btn-sm" onclick="doAction('${a.id}','found')">Mark as Found</button>
    </div><div id="inlineZone"></div>`;
  }
  return `<div id="inlineZone"></div>`;
}

let pendingScan = null;

      <div class="field"><label>Project</label><input id="f-proj" placeholder="e.g. Project A"></div>
      <div class="field"><label>Destination Location</label><input id="f-destzone" placeholder="e.g. Site A - Zone 2" value="${a?a.zone:''}"></div>
      <div class="field"><label>Due Back</label><input id="f-due" type="datetime-local"></div>
      ${photoScanBlock("before")}

    </div>`;
  } else if(kind==="return"){
    zone.innerHTML = `<div class="inline-form">
      ${photoScanBlock("after")}

        </select>
      </div>

    </div>`;
  } else if(kind==="move"){
    zone.innerHTML = `<div class="inline-form">
      <div class="field"><label>New Zone</label><input id="f-zone" placeholder="e.g. Site B - Zone 1"></div>
      <button class="btn btn-primary btn-sm" onclick="doAction('${id}','move')">Confirm Move</button>
    </div>`;
  } else if(kind==="repair"){
    zone.innerHTML = `<div class="inline-form">
      <div class="field"><label>Damage Note</label><input id="f-note" placeholder="e.g. Cracked housing"></div>
      <button class="btn btn-danger btn-sm" onclick="doAction('${id}','repair')">Flag for Repair</button>
    </div>`;
  } else if(kind==="missing"){

function photoScanBlock(stage){
  return `
  <div class="field">
    <label>${stage==="before"?"Before-Use Photo":"After-Use Photo"} (optional)</label>
    <input type="file" accept="image/*" capture="environment" id="scan-photo-${stage}" onchange="handlePhotoPick('${stage}')">
  </div>
  <div id="scan-result-${stage}"></div>
  `;
}

function handlePhotoPick(stage){
  const input = document.getElementById(`scan-photo-${stage}`);
  const resultBox = document.getElementById(`scan-result-${stage}`);
  if(!input.files || !input.files[0]){ return; }
  resultBox.innerHTML = `<div class="empty-note">Analyzing photo…</div>`;
  const file = input.files[0];
  const img = new Image();
  const reader = new FileReader();
  reader.onload = e => { img.src = e.target.result; };
  img.onload = () => {
    const canvas = document.createElement("canvas");
    const size = 120;
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0, size, size);
    const data = ctx.getImageData(0,0,size,size).data;
    // Compute luminance grid
    const lum = new Float32Array(size*size);
    for(let i=0, p=0; i<data.length; i+=4, p++){
      lum[p] = 0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2];
    }
    // Local contrast / edge irregularity (simple horizontal+vertical gradient)
    let edgeSum = 0, edgeCount = 0;
    for(let y=1; y<size-1; y++){
      for(let x=1; x<size-1; x++){
        const idx = y*size+x;
        const gx = Math.abs(lum[idx+1]-lum[idx-1]);
        const gy = Math.abs(lum[idx+size]-lum[idx-size]);
        edgeSum += (gx+gy);
        edgeCount++;
      }
    }
    const edgeDensity = edgeSum/edgeCount; // rough surface-irregularity score
    let label, cls, note;
    if(edgeDensity < 14){ label="No damage found"; cls="ok"; note="Surface reads clean and uniform."; }
    else if(edgeDensity < 26){ label="Minor wear detected"; cls="warn"; note="Some surface irregularity — worth a quick visual check."; }
    else { label="Possible damage detected"; cls="damage"; note="High surface irregularity — recommend inspection before use."; }
    pendingScan = {stage, score:Math.round(edgeDensity), label, cls};
    resultBox.innerHTML = `<div class="scan-result scan-${cls}">
      <b>${label}</b> <span class="mono" style="opacity:.7;">(score ${pendingScan.score})</span>
      <div style="font-size:11.5px;opacity:.85;margin-top:3px;">${note}</div>
    </div>`;
    // auto-set the return condition dropdown if present
    const condSel = document.getElementById("f-cond");
    if(condSel) condSel.value = (cls==="ok") ? "ok" : "damage";
  };
  reader.readAsDataURL(file);
}

async function doAction(id, kind){
  const a = findAsset(id);
  if(!a) return;
  const now = Date.now();
  if(kind==="checkout"){
    const emp = (document.getElementById("f-emp")?.value||"").trim() || "Unassigned";
    const approver = (document.getElementById("f-approver")?.value||"").trim() || "—";
    const proj = (document.getElementById("f-proj")?.value||"").trim() || "—";
    const destZone = (document.getElementById("f-destzone")?.value||"").trim() || a.zone;
    const dueVal = document.getElementById("f-due")?.value;
    const due = dueVal? new Date(dueVal).getTime() : now+86400000;
    const fromZone = a.zone;
    a.status="In Use"; a.assignedTo=emp; a.approvedBy=approver; a.project=proj; a.zone=destZone; a.dueDate=due; a.checkOutTime=now;
    let detail = `${emp} · approved by ${approver} · ${proj} · to ${destZone} · due ${fmtDate(due)}`;
    a.history.push({time:now, action:"Checked out", detail});
    if(fromZone!==destZone){
      a.history.push({time:now, action:"Moved", detail:`${fromZone} → ${destZone}`});
    }
    if(pendingScan && pendingScan.stage==="before"){
      a.history.push({time:now, action:"Before-use photo check", detail:`${pendingScan.label} (score ${pendingScan.score})`});
    }
    addLog("info","Asset checked out", `${a.id} · ${emp} · approved by ${approver}`);
    showToast(`${a.id} checked out to ${emp}`);
  } else if(kind==="return"){
    const cond = document.getElementById("f-cond")?.value || "ok";
    const scanNote = (pendingScan && pendingScan.stage==="after") ? ` — ${pendingScan.label} (score ${pendingScan.score})` : " — no photo scanned, condition set manually";
    if(cond==="damage"){
      a.status="Under Repair";
      a.history.push({time:now, action:"Returned — damage found", detail:`After-use check${scanNote}`});
      addLog("warn","Damage detected on return", `${a.id}`);
      showToast(`${a.id} returned — flagged for repair`);
    } else {
      a.status="Available";
      a.history.push({time:now, action:"Returned", detail:`After-use check${scanNote}`});
      addLog("info","Asset returned", `${a.id}`);
      showToast(`${a.id} returned — available`);
    }
    a.assignedTo=null; a.approvedBy=null; a.project=null; a.dueDate=null;
  } else if(kind==="move"){
    const zoneVal = (document.getElementById("f-zone")?.value||"").trim();
    if(!zoneVal) return;
    const from = a.zone;
    a.zone = zoneVal;
    a.history.push({time:now, action:"Moved", detail:`${from} → ${zoneVal}`});
    addLog("info","Asset moved", `${a.id} · ${from} → ${zoneVal}`);
    showToast(`${a.id} moved to ${zoneVal}`);
  } else if(kind==="repair"){
    const note = (document.getElementById("f-note")?.value||"").trim() || "Damage reported";
    a.status="Under Repair"; a.assignedTo=null; a.project=null; a.dueDate=null;
    a.history.push({time:now, action:"Flagged for repair", detail:note});
    addLog("warn","Flagged for repair", `${a.id} · ${note}`);
    showToast(`${a.id} flagged for repair`);
  } else if(kind==="missing"){
    a.status="Missing";
    a.history.push({time:now, action:"Marked missing", detail:"Reported by user"});
    addLog("danger","Asset marked missing", `${a.id}`);
    showToast(`${a.id} marked missing`);
  } else if(kind==="restore"){
    a.status="Available"; a.zone=a.zone;
    a.history.push({time:now, action:"Repair completed", detail:"Back in service"});
    addLog("info","Repair completed", `${a.id}`);
    showToast(`${a.id} back in service`);
  } else if(kind==="found"){
    a.status="Available";
    a.history.push({time:now, action:"Found", detail:"Asset located and returned to inventory"});
    addLog("info","Asset found", `${a.id}`);
    showToast(`${a.id} marked found`);
  }
  pendingScan = null;
  await saveData();
  if(appMode==="staff"){
    kioskShowSuccess(id, kind);
  } else {
    renderNav();
    openDetail(id);
    if(currentView==="dashboard"||currentView==="assets"||currentView==="alerts") renderView();
  }
}

/* ---------------------------------------------------------------
   SCANNER (shared by admin Scan view and staff kiosk)
--------------------------------------------------------------- */
function scanResult(id){
  const a = findAsset(id);
  if(!a){ showToast("Unknown asset ID"); return; }
  stopScanner();
  showToast(`Scanned ${id}`);
  openDetail(id);
}
async function initScanner(camId, msgId, onDetect){
  const camBox = document.getElementById(camId);
  const msg = document.getElementById(msgId);
  if(!camBox) return;
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    if(msg) msg.textContent = "Camera not available in this window. Use quick pick to simulate a scan.";
    return;
  }
  try{
    scanStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
    const video = document.createElement("video");
    video.setAttribute("playsinline","true");
    video.srcObject = scanStream;
    camBox.innerHTML = "";
    camBox.appendChild(video);
    const frame = document.createElement("div");
    frame.className = "scan-frame";
    camBox.appendChild(frame);
    await video.play();
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");
    function tick(){
      if(!scanStream) return;
      if(video.readyState===video.HAVE_ENOUGH_DATA){
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video,0,0,canvas.width,canvas.height);
        const imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
        const code = jsQR(imgData.data, imgData.width, imgData.height);
        if(code && code.data){
          onDetect(code.data.trim());
          return;
        }
      }
      scanRAF = requestAnimationFrame(tick);
    }
    scanRAF = requestAnimationFrame(tick);
  }catch(e){
    if(msg) msg.textContent = "Camera access denied or unavailable. Use quick pick to simulate a scan.";
    else camBox.innerHTML = `<div class="scan-msg">Camera access denied or unavailable. Use quick pick to simulate a scan.</div>`;
  }
}
function stopScanner(){
  if(scanRAF){ cancelAnimationFrame(scanRAF); scanRAF=null; }
  if(scanStream){ scanStream.getTracks().forEach(t=>t.stop()); scanStream=null; }
}

/* ---------------------------------------------------------------
   STAFF KIOSK — scan, then check out or return, nothing else
--------------------------------------------------------------- */
function viewKioskHome(){
  return `
  <div class="kiosk-hero">
    <h1>Scan a Tool</h1>
    <p>Point the camera at the tool's QR tag to check it out or return it.</p>
  </div>
  <div class="scan-cam" id="scanCamStaff" style="margin:0 auto;">
    <div class="scan-msg" id="scanMsgStaff">Requesting camera…</div>
  </div>
  <div class="panel" style="margin-top:18px;">
    <div class="panel-title"><h3>Quick Pick</h3><span class="count">No camera? Tap a tag</span></div>
    <div class="quick-pick" id="kioskQuickPick">
      ${DATA.assets.slice(0,10).map(a=>`<button onclick="staffScanResult('${a.id}')">${a.id}</button>`).join("")}
    </div>
  </div>
  <div id="kioskResultZone"></div>
  `;
}
function restartKioskScanner(){
  const root = document.getElementById("kioskRoot");
  if(!root) return;
  root.innerHTML = viewKioskHome();
  initScanner("scanCamStaff","scanMsgStaff", staffScanResult);
}
function staffScanResult(id){
  stopScanner();
  const a = findAsset(id);
  if(!a){ renderKioskError(id); return; }
  showToast(`Scanned ${id}`);
  renderKioskResult(id);
}
function renderKioskResult(id){
  const a = findAsset(id);
  const st = effectiveStatus(a);
  const zone = document.getElementById("kioskResultZone");
  if(!zone) return;
  let actionHtml;
  if(st==="Available"){
    actionHtml = kioskCheckoutForm(a);
  } else if(st==="In Use" || st==="Overdue"){
    actionHtml = kioskReturnForm(a);
  } else {
    actionHtml = `<div class="kiosk-note">This tool is currently <b>${st}</b>. Please contact your supervisor before using it.</div>
      <button class="btn btn-sm" style="margin-top:12px;" onclick="restartKioskScanner()">Scan Another Tool</button>`;
  }
  zone.innerHTML = `<div class="kiosk-result-card">
    <div class="kiosk-result-top">
      <div>
        <div class="aid mono">${a.id}</div>
        <div class="aname">${a.name}</div>
      </div>
      ${badge(st)}
    </div>
    <div class="asset-meta">${a.zone}${a.assignedTo? " · with "+a.assignedTo:""}</div>
    ${actionHtml}
  </div>`;
}
function renderKioskError(id){
  const zone = document.getElementById("kioskResultZone");
  if(!zone) return;
  zone.innerHTML = `<div class="kiosk-result-card">
    <div class="kiosk-note">No tool found for code "${id}". Try scanning again.</div>
    <button class="btn btn-sm" style="margin-top:12px;" onclick="restartKioskScanner()">Try Again</button>
  </div>`;
}
function kioskCheckoutForm(a){
  pendingScan = null;
  return `<div class="inline-form" style="margin-top:14px;">
    <div class="field"><label>Employee (borrower)</label><input id="f-emp" placeholder="e.g. John Smith"></div>
    <div class="field"><label>Approved By</label><input id="f-approver" placeholder="e.g. Site Supervisor name"></div>
    <div class="field"><label>Project</label><input id="f-proj" placeholder="e.g. Project A"></div>
    <div class="field"><label>Destination Location</label><input id="f-destzone" value="${a.zone}"></div>
    <div class="field"><label>Due Back</label><input id="f-due" type="datetime-local"></div>
    ${photoScanBlock("before")}
    <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:10px;" onclick="doAction('${a.id}','checkout')">Confirm Check Out</button>
  </div>`;
}
function kioskReturnForm(a){
  pendingScan = null;
  return `<div class="inline-form" style="margin-top:14px;">
    ${photoScanBlock("after")}
    <div class="field" style="margin-top:10px;"><label>Condition (auto-filled by scan, or set manually)</label>
      <select id="f-cond">
        <option value="ok">No damage found</option>
        <option value="damage">Damage detected</option>
      </select>
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="doAction('${a.id}','return')">Confirm Return</button>
  </div>`;
}
function kioskShowSuccess(id, kind){
  const a = findAsset(id);
  const zone = document.getElementById("kioskResultZone");
  if(!a || !zone) return;
  const verb = kind==="checkout" ? "Checked Out" : "Returned";
  zone.innerHTML = `<div class="kiosk-result-card">
    <div class="kiosk-success">
      <div class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 13l4 4L19 7"/></svg></div>
      <h3>${a.id} ${verb}</h3>
      <p>${a.name}</p>
      <p style="font-size:12.5px;color:var(--muted);margin-top:-10px;">Now at <b style="color:var(--text);">${a.zone}</b>${a.assignedTo? " · with "+a.assignedTo:""}</p>
      <button class="btn btn-primary" onclick="restartKioskScanner()">Scan Next Tool</button>
    </div>
  </div>`;
}

--------------------------------------------------------------- */

const ADMIN_PIN = "1234";

function enterStaff(){
  appMode = "staff";
  stopScanner();
  closeModal();
  document.getElementById("gateShell").classList.add("hidden");
  document.getElementById("adminShell").classList.add("hidden");
  document.getElementById("staffShell").classList.remove("hidden");

}
function promptAdminPin(){
  const pin = prompt("Enter manager PIN to open Back Office (demo PIN: 1234):");
  if(pin===null) return;
  if(pin.trim()===ADMIN_PIN){
    enterAdmin();
  } else {
    showToast("Incorrect PIN");
  }
}
function enterAdmin(){
  appMode = "admin";
  stopScanner();
  closeModal();
  document.getElementById("gateShell").classList.add("hidden");
  document.getElementById("staffShell").classList.add("hidden");
  document.getElementById("adminShell").classList.remove("hidden");

  renderNav();
  renderView();
}
function exitToStaff(){
  document.getElementById("adminShell").classList.add("hidden");
  enterStaff();
}

function showToast(msg){
  const root = document.getElementById("toastRoot");

}
